                { id: 'arena', label: 'Milestones', icon: 'M9 12l2 2 4-4M7.835 4.697a3.42 3.42 0 001.946-.806 3.42 3.42 0 014.438 0 3.42 3.42 0 001.946.806 3.42 3.42 0 013.138 3.138 3.42 3.42 0 00.806 1.946 3.42 3.42 0 010 4.438 3.42 3.42 0 00-.806 1.946 3.42 3.42 0 01-3.138 3.138 3.42 3.42 0 00-1.946.806 3.42 3.42 0 01-4.438 0 3.42 3.42 0 00-1.946-.806 3.42 3.42 0 01-3.138-3.138 3.42 3.42 0 00-.806-1.946 3.42 3.42 0 010-4.438 3.42 3.42 0 00.806-1.946 3.42 3.42 0 013.138-3.138z' },
              ].map(tab => (
                <button key={tab.id} className={`nav-btn ${activeTab === tab.id ? 'active' : ''}`}
                  onClick={() => { sfx('click', soundOn); setActiveTab(tab.id); haptic(25); }}>
                  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
                    <path strokeLinecap="round" strokeLinejoin="round" d={tab.icon} />
                  </svg>
                  {tab.label}
                </button>
              ))}
            </nav>

            {/* ── Toast ── */}
            {toast && <div className={`toast toast-${toast.type}`}>{toast.text}</div>}

            {/* ── Level Up Modal ── */}
            {levelUpData && (
              <div style={{ position: 'fixed', inset: 0, zIndex: 60, background: 'rgba(0,0,0,0.8)', backdropFilter: 'blur(12px)', display: 'flex', alignItems: 'center', justifyContent: 'center', padding: 20 }}
                onClick={() => setLevelUpData(null)}>
                <div className="card animate-fade-up" style={{ maxWidth: 320, width: '100%', textAlign: 'center', padding: 28, border: '1px solid var(--border-active)' }} onClick={e => e.stopPropagation()}>
                  <div style={{ fontSize: 52, marginBottom: 12 }}>{levelUpData.icon}</div>
                  <div className="badge badge-accent" style={{ marginBottom: 10 }}>Level Up!</div>
                  <h3 style={{ fontSize: 20, fontWeight: 900, letterSpacing: '-0.02em', marginBottom: 6 }}>Level {levelUpData.level}</h3>
                  <p style={{ fontSize: 13, color: 'var(--accent)', fontWeight: 700, marginBottom: 6 }}>{levelUpData.title}</p>
                  <p style={{ fontSize: 11, color: 'var(--text-muted)', marginBottom: 20 }}>You've unlocked a new rank. Keep the momentum going!</p>
                  <button className="btn-primary" onClick={() => setLevelUpData(null)}>Continue →</button>
                </div>
              </div>
            )}

            {/* ── Add Habit Modal ── */}
            {showAddModal && <AddHabitModal onClose={() => setShowAddModal(false)} onSubmit={createHabit} soundOn={soundOn} />}

            {/* ── Edit Habit Modal ── */}
            {editHabit && <EditHabitModal habit={editHabit} onClose={() => setEditHabit(null)} onSubmit={updateHabit} onDelete={deleteHabit} soundOn={soundOn} />}

          </div>
        </div>
      );
    }

    /* ══════════════════════════════════════
       ADD HABIT MODAL
    ══════════════════════════════════════ */
    function AddHabitModal({ onClose, onSubmit, soundOn }) {
      const [name, setName] = useState('');
      const [desc, setDesc] = useState('');
      const [type, setType] = useState('checkbox');
      const [target, setTarget] = useState(1);
      const [unit, setUnit] = useState('Session');
      const [cue, setCue] = useState('');
      const [color, setColor] = useState('#FFB74D');
      const [importance, setImportance] = useState('medium');

      const handleSubmit = e => {
        e.preventDefault();
        if (!name.trim()) return;
        onSubmit({ name: name.trim(), description: desc, type, targetValue: type === 'checkbox' ? 1 : Number(target), unit: type === 'checkbox' ? 'Session' : unit, cue, color, importance });
      };

      return (
        <div className="modal-overlay" onClick={onClose}>
          <div className="modal-panel" onClick={e => e.stopPropagation()}>
            <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 20, paddingBottom: 16, borderBottom: '1px solid var(--border)' }}>
              <div>
                <h3 style={{ fontSize: 14, fontWeight: 900, letterSpacing: '-0.01em' }}>New Habit</h3>
                <p style={{ fontSize: 10, color: 'var(--text-muted)', marginTop: 2 }}>Define your routine parameters</p>
              </div>
              <button onClick={onClose} style={{ width: 32, height: 32, borderRadius: 10, background: 'var(--bg-elevated)', border: '1px solid var(--border)', cursor: 'pointer', color: 'var(--text-secondary)', display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 16 }}>✕</button>
            </div>

            <form onSubmit={handleSubmit} style={{ display: 'flex', flexDirection: 'column', gap: 16 }}>
              <div>
                <label className="label">Habit Name *</label>
                <input className="input-field" type="text" placeholder="e.g. Morning Meditation" required value={name} onChange={e => setName(e.target.value)} />
              </div>
              <div>
                <label className="label">Description</label>
                <textarea className="input-field" placeholder="Success parameters..." rows={2} value={desc} onChange={e => setDesc(e.target.value)} />
              </div>

              <div>
                <label className="label">Goal Type</label>
                <div className="tab-segment">
                  <button type="button" className={`tab-seg-btn ${type === 'checkbox' ? 'active' : ''}`} onClick={() => setType('checkbox')}>✓ Simple Check</button>
                  <button type="button" className={`tab-seg-btn ${type === 'numeric' ? 'active' : ''}`} onClick={() => setType('numeric')}>123 Numeric</button>
                </div>
                {type === 'numeric' && (
                  <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 10, marginTop: 10 }}>
                    <div>
                      <label className="label">Target Count</label>
                      <input className="input-field" type="number" min="1" value={target} onChange={e => setTarget(e.target.value)} />
                    </div>
                    <div>
                      <label className="label">Unit</label>
                      <input className="input-field" type="text" placeholder="Pages, mins..." value={unit} onChange={e => setUnit(e.target.value)} />
                    </div>
                  </div>
                )}
              </div>

              <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 10 }}>
                <div>
                  <label className="label">Anchor Cue</label>
                  <input className="input-field" type="text" placeholder="After I wake up..." value={cue} onChange={e => setCue(e.target.value)} />
                </div>
                <div>
                  <label className="label">Priority</label>
                  <select className="input-field" value={importance} onChange={e => setImportance(e.target.value)}>
                    <option value="medium">Standard</option>
                    <option value="high">Critical</option>
                  </select>
                </div>
              </div>

              <div>
                <label className="label">Accent Color</label>
                <div style={{ display: 'flex', gap: 8, flexWrap: 'wrap' }}>
                  {HABIT_COLORS.map(c => (
                    <button key={c} type="button" className={`swatch ${color === c ? 'selected' : ''}`} style={{ background: c }} onClick={() => setColor(c)} />
                  ))}
                </div>
              </div>

              <div style={{ display: 'flex', gap: 10, paddingTop: 8, borderTop: '1px solid var(--border)' }}>
                <button type="button" className="btn-ghost" onClick={onClose} style={{ flex: 1 }}>Cancel</button>
                <button type="submit" className="btn-primary" style={{ flex: 2 }}>Add Habit 🌱</button>
              </div>
            </form>
          </div>
        </div>
      );
    }

    /* ══════════════════════════════════════
       EDIT HABIT MODAL
    ══════════════════════════════════════ */
    function EditHabitModal({ habit, onClose, onSubmit, onDelete, soundOn }) {
      const [name, setName] = useState(habit.name);
      const [desc, setDesc] = useState(habit.description || '');
      const [type, setType] = useState(habit.type);
      const [target, setTarget] = useState(habit.targetValue);
      const [unit, setUnit] = useState(habit.unit || 'Session');
      const [cue, setCue] = useState(habit.cue || '');
      const [color, setColor] = useState(habit.color || '#FFB74D');
      const [importance, setImportance] = useState(habit.importance || 'medium');
      const [confirmDelete, setConfirmDelete] = useState(false);

      const handleSubmit = e => {
        e.preventDefault();
        if (!name.trim()) return;
        onSubmit({ ...habit, name: name.trim(), description: desc, type, targetValue: type === 'checkbox' ? 1 : Number(target), unit: type === 'checkbox' ? 'Session' : unit, cue, color, importance });
      };

      return (
        <div className="modal-overlay" onClick={onClose}>
          <div className="modal-panel" onClick={e => e.stopPropagation()}>
            <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 20, paddingBottom: 16, borderBottom: '1px solid var(--border)' }}>
              <div>
                <h3 style={{ fontSize: 14, fontWeight: 900, letterSpacing: '-0.01em' }}>Edit Habit</h3>
                <p style={{ fontSize: 10, color: 'var(--text-muted)', marginTop: 2 }}>Modify targets or parameters</p>
              </div>
              <button onClick={onClose} style={{ width: 32, height: 32, borderRadius: 10, background: 'var(--bg-elevated)', border: '1px solid var(--border)', cursor: 'pointer', color: 'var(--text-secondary)', display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 16 }}>✕</button>
            </div>

            <form onSubmit={handleSubmit} style={{ display: 'flex', flexDirection: 'column', gap: 16 }}>
              <div>
                <label className="label">Habit Name *</label>
                <input className="input-field" type="text" required value={name} onChange={e => setName(e.target.value)} />
              </div>
              <div>
                <label className="label">Description</label>
                <textarea className="input-field" rows={2} value={desc} onChange={e => setDesc(e.target.value)} />
              </div>

              <div>
                <label className="label">Goal Type</label>
                <div className="tab-segment">
                  <button type="button" className={`tab-seg-btn ${type === 'checkbox' ? 'active' : ''}`} onClick={() => setType('checkbox')}>✓ Simple Check</button>
                  <button type="button" className={`tab-seg-btn ${type === 'numeric' ? 'active' : ''}`} onClick={() => setType('numeric')}>123 Numeric</button>
                </div>
                {type === 'numeric' && (
                  <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 10, marginTop: 10 }}>
                    <div>
                      <label className="label">Target</label>
                      <input className="input-field" type="number" min="1" value={target} onChange={e => setTarget(e.target.value)} />
                    </div>
                    <div>
                      <label className="label">Unit</label>
                      <input className="input-field" type="text" placeholder="Pages, mins..." value={unit} onChange={e => setUnit(e.target.value)} />
                    </div>
                  </div>
                )}
              </div>

              <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 10 }}>
                <div>
                  <label className="label">Anchor Cue</label>
                  <input className="input-field" type="text" value={cue} onChange={e => setCue(e.target.value)} />
                </div>
                <div>
                  <label className="label">Priority</label>
                  <select className="input-field" value={importance} onChange={e => setImportance(e.target.value)}>
                    <option value="medium">Standard</option>
                    <option value="high">Critical</option>
                  </select>
                </div>
              </div>

              <div>
                <label className="label">Accent Color</label>
                <div style={{ display: 'flex', gap: 8, flexWrap: 'wrap' }}>
                  {HABIT_COLORS.map(c => (
                    <button key={c} type="button" className={`swatch ${color === c ? 'selected' : ''}`} style={{ background: c }} onClick={() => setColor(c)} />
                  ))}
                </div>
              </div>

              {/* Delete section */}
              <div style={{ paddingTop: 10, borderTop: '1px solid var(--border)' }}>
                {confirmDelete ? (
                  <div style={{ background: 'var(--danger-dim)', border: '1px solid rgba(248,113,113,0.25)', borderRadius: 12, padding: 14, display: 'flex', alignItems: 'center', justifyContent: 'space-between', gap: 10 }}>
                    <span style={{ fontSize: 11, color: 'var(--danger)', fontWeight: 700 }}>Delete this habit permanently?</span>
                    <div style={{ display: 'flex', gap: 8 }}>
                      <button type="button" onClick={() => onDelete(habit.id)} style={{ padding: '6px 12px', background: 'var(--danger)', color: '#fff', border: 'none', borderRadius: 8, fontSize: 11, fontWeight: 700, cursor: 'pointer', fontFamily: 'var(--font-body)' }}>Delete</button>
                      <button type="button" onClick={() => setConfirmDelete(false)} style={{ padding: '6px 12px', background: 'var(--bg-elevated)', color: 'var(--text-secondary)', border: '1px solid var(--border)', borderRadius: 8, fontSize: 11, fontWeight: 700, cursor: 'pointer', fontFamily: 'var(--font-body)' }}>No</button>
                    </div>
                  </div>
                ) : (
                  <div style={{ display: 'flex', gap: 10 }}>
                    <button type="button" className="btn-danger" onClick={() => setConfirmDelete(true)} style={{ flex: 1 }}>🗑 Delete Habit</button>
                    <button type="button" className="btn-ghost" onClick={onClose} style={{ flex: 1 }}>Cancel</button>
                    <button type="submit" className="btn-primary" style={{ flex: 1 }}>Save Changes</button>
                  </div>
                )}
              </div>
            </form>
          </div>
        </div>
      );
    }

    /* ── Mount ── */
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
